<!doctype html>

    <title>Chain Hub</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <strong>chain hub</strong>
          <span id="sidebar-url">localhost</span>

        <nav class="sidebar-nav" aria-label="Primary">
          <a href="#skills" data-nav="skills" class="active">Skills</a>
          <a href="#status" data-nav="status">Status</a>

    <div id="modal-root" class="modal-root hidden" aria-hidden="true"></div>

    <script type="module" src="./main.js"></script>
